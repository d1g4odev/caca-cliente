server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: qualquer rota desconhecida cai no index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api -> serviço da API (nome do serviço no docker-compose)
    location /api/ {
        proxy_pass http://api:3001;

        # ── Crítico para SSE (Server-Sent Events) ─────────────────────────
        # Sem isso, o nginx bufferiza a resposta e os eventos chegam em lote
        # depois de minutos. Com isso, fluem em tempo real.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;       # SSE pode ficar aberto bastante tempo
        proxy_send_timeout 24h;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
